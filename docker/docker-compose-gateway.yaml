version: '3.8'
services:
  gateway-envoy:
    image: "ghcr.io/darpa-askem/envoy:v1.25.2"
    container_name: gateway-envoy
    networks:
      - terarium
    ports:
      - "8078:10000"
      - "8001:8001"
    command: ['envoy', '-c', '/data/config.yaml', '--service-cluster', 'envoy', '--service-node', 'envoy', '--log-level', 'debug']
    volumes:
      - ./envoy/:/data/

  keycloak:
    image: "ghcr.io/unchartedsoftware/keycloak:0.2.0"
    container_name: keycloak
    networks:
      - terarium
    ports:
      - '8079:80'
    healthcheck:
      test: [ 'CMD', 'curl', '--head', '0.0.0.0:8081/health/ready' ]
      interval: '3s'
      timeout: '3s'
      retries: 30
    command: [ 'start', '--http-port=8081' ]
    environment:
      KC_DB_URL_HOST: 'keycloak-postgres'
      PROXY_ADDRESS_FORWARDING: 'true'
      KEYCLOAK_ADMIN: 'admin'
      KC_HOSTNAME: 'keycloak'
      KC_HOSTNAME_PORT: '80'
      KC_HOSTNAME_ADMIN_URL: 'http://keycloak:8079'
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
    depends_on:
      keycloak-init:
        condition: service_completed_successfully
      keycloak-postgres:
        condition: service_healthy
    volumes:
      - ./realm/:/data/

  keycloak-init:
    image: ghcr.io/unchartedsoftware/keycloak:0.2.0
    container_name: keycloak-init
    networks:
      - terarium
    command: [ 'import', '--dir', '/data', '--override', 'false' ]
    volumes:
      - ./realm:/data
    environment:
      KEYCLOAK_ADMIN: 'admin'
      KEYCLOAK_ADMIN_PASSWORD: 'admin123'
      PROXY_ADDRESS_FORWARDING: '"true"'
      KC_DB_URL_HOST: keycloak-postgres
    depends_on:
      keycloak-postgres:
        condition: service_healthy

  keycloak-postgres:
    image: "ghcr.io/darpa-askem/postgres:15.1"
    container_name: keycloak-postgres
    restart: always
    networks:
      - terarium
    ports:
      - "5432:5432"
    user: postgres
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_DB: 'terarium'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "terarium" ]
      interval: '3s'
      timeout: '3s'
      retries: 30
    volumes:
      - ./docker/postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

networks:
  terarium:
    name: terarium
